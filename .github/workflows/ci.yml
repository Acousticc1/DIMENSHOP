# DIMENSHOP CI Pipeline

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mobile-lint:
    name: Mobile - Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json
      - run: cd apps/mobile && npm ci
      - run: cd apps/mobile && npx tsc --noEmit
      - run: cd apps/mobile && npm run lint

  mobile-test:
    name: Mobile - Unit Tests
    runs-on: ubuntu-latest
    needs: mobile-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json
      - run: cd apps/mobile && npm ci
      - run: cd apps/mobile && npm test -- --coverage

  backend-test:
    name: Backend - Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd apps/backend && pip install -r requirements.txt
      - run: cd apps/backend && pytest --tb=short -q
